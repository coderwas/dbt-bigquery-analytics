models:
  - name: dim__employee
    description: SCD2 employee dimension

    columns:
      - name: employee_key
        tests:
          - not_null
          - unique

      - name: employee_id
        tests:
          - not_null

      - name: is_current
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                quote: false